<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HRX CreatorNET – Mehr erfahren</title>

<style>
/* ===== Reset / Base ===== */
*{ box-sizing:border-box; }
html,body{ height:100%; }
body{
  margin:0;
  font-family: Arial, Helvetica, sans-serif;
  color:#fff;
  background:
    radial-gradient(1200px 600px at 20% 0%, rgba(122,77,255,0.35), transparent 55%),
    radial-gradient(900px 500px at 90% 20%, rgba(167,123,255,0.25), transparent 60%),
    radial-gradient(circle at top, #1a1033, #05070f);
  overflow-x:hidden;
}

/* Subtle grid texture */
body:before{
  content:"";
  position:fixed; inset:0;
  background-image:
    linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events:none;
  opacity:0.35;
}

/* ===== Header ===== */
.header{
  position:fixed;
  top:0; left:0; right:0;
  height:84px;
  z-index:1000;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 24px;
  background: linear-gradient(90deg, rgba(20,11,42,0.92), rgba(11,15,30,0.92));
  border-bottom: 1px solid rgba(167,123,255,0.22);
  box-shadow: 0 12px 40px rgba(0,0,0,0.45);
  backdrop-filter: blur(10px);
}
.brand{
  display:flex;
  align-items:center;
  gap:14px;
  text-decoration:none;
  color:#fff;
}
.brand img{ height:52px; display:block; }
.brand .brand-text{
  display:flex;
  flex-direction:column;
  line-height:1.05;
}
.brand .brand-text strong{
  font-size:14px;
  letter-spacing:0.08em;
  text-transform:uppercase;
  opacity:0.9;
}
.brand .brand-text span{
  font-size:12px;
  opacity:0.7;
}

/* Language switch */
.lang-switch{
  display:flex;
  gap:10px;
  flex-shrink:0;
}
.lang-btn{
  padding:7px 14px;
  border-radius:12px;
  background: rgba(122,77,255,0.18);
  border: 1px solid rgba(167,123,255,0.25);
  color:#fff;
  font-size:13px;
  cursor:pointer;
  user-select:none;
  box-shadow: 0 0 14px rgba(122,77,255,0.25);
  transition: transform .15s ease, background .15s ease, box-shadow .15s ease;
  white-space:nowrap;
}
.lang-btn:hover{
  transform: translateY(-1px);
  background: rgba(167,123,255,0.28);
  box-shadow: 0 0 22px rgba(167,123,255,0.35);
}

/* ===== Layout ===== */
.wrap{
  max-width:1100px;
  margin:0 auto;
  padding: 120px 20px 70px;
}

/* ===== Hero ===== */
.hero{
  position:relative;
  border-radius:22px;
  padding:32px 26px;
  background:
    radial-gradient(700px 240px at 25% 0%, rgba(122,77,255,0.35), transparent 65%),
    linear-gradient(180deg, rgba(255,255,255,0.07), rgba(255,255,255,0.03));
  border: 1px solid rgba(167,123,255,0.18);
  box-shadow: 0 20px 70px rgba(0,0,0,0.55);
  overflow:hidden;
}
.hero:after{
  content:"";
  position:absolute;
  inset:-2px;
  background: radial-gradient(600px 220px at 80% 30%, rgba(167,123,255,0.18), transparent 60%);
  pointer-events:none;
}
.hero-top{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:18px;
  position:relative;
  z-index:1;
}
.kicker{
  font-size:12px;
  letter-spacing:0.16em;
  text-transform:uppercase;
  color:#d8cfff;
  opacity:0.9;
  margin-bottom:10px;
}
.hero h1{
  margin:0 0 10px 0;
  font-size:42px;
  letter-spacing:-0.02em;
}
.hero p{
  margin:0;
  max-width:720px;
  opacity:0.85;
  font-size:16px;
  line-height:1.5;
}
.hero-actions{
