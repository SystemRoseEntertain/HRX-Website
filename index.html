<style>

    align-items: center;
    justify-content: center;
    height: 100vh;
    text-align: center;
}

.container {
    max-width: 800px;

.logo {

    display: inline-block;
    margin: 6px 5px 0 5px;

    color: #d8cfff;
    background: rgba(122,77,255,0.15);
    box-shadow: 0 0 10px rgba(122,77,255,0.6);
    transition: 0.2s;

.footer-btn:hover {
