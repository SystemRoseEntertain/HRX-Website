<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HRX CreatorNET – Login</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root{
  --bg:#f7f6f3;
  --bg-2:#efeeea;
  --text:#171923;
  --muted:#8e93a3;
  --violet:#6841b7;
  --violet-dark:#5932aa;
  --shadow:0 20px 45px rgba(16,18,24,0.10);
  --shadow-soft:0 12px 28px rgba(16,18,24,0.07);
}

*{box-sizing:border-box;}

body{
  margin:0;
  font-family:Arial;
  background:
    radial-gradient(600px 300px at 60% 20%, rgba(104,65,183,0.08), transparent),
    linear-gradient(180deg, var(--bg), var(--bg-2));
}

/* Layout */
.wrapper{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:80px;
  padding:40px;
}

/* LOGIN CARD */
.card{
  width:420px;
  background:rgba(255,255,255,0.85);
  padding:30px;
  border-radius:28px;
  box-shadow:var(--shadow);
  backdrop-filter:blur(10px);
}

.card h1{
  text-align:center;
  margin:0 0 10px;
}

.card p{
  text-align:center;
  color:var(--muted);
}

/* Inputs */
.field{
  margin-top:18px;
}

input{
  width:100%;
  padding:14px;
  border-radius:14px;
  border:1px solid #ddd;
}

/* Button */
button{
  margin-top:20px;
  width:100%;
  padding:16px;
  border:none;
  border-radius:999px;
  background:var(--violet);
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  background:var(--violet-dark);
}

/* Message */
.msg{
  margin-top:15px;
  padding:12px;
  border-radius:12px;
  display:none;
}

.msg.error{
  background:#ffe5e5;
  color:#b42318;
}

.msg.success{
  background:#e6fff1;
  color:#0f7b4d;
}

/* LOGO RIGHT */
.logo-side{
  max-width:500px;
  opacity:0.08;
}

.logo-side img{
  width:100%;
}

/* Mobile */
@media(max-width:900px){
  .wrapper{
    flex-direction:column;
  }
  .logo-side{
    display:none;
  }
}
</style>
</head>

<body>

<div class="wrapper">

  <!-- LOGIN -->
  <div class="card">
    <h1>Login</h1>
    <p>HRX CreatorNET Zugang</p>

    <form id="login-form">
      <div class="field">
        <input type="email" id="email" placeholder="E-Mail" required>
      </div>

      <div class="field">
        <input type="password" id="password" placeholder="Passwort" required>
      </div>

      <button type="submit">Einloggen</button>
    </form>

    <div id="msg" class="msg"></div>
  </div>

  <!-- LOGO RIGHT -->
  <div class="logo-side">
    <img src="HRX_Logo_Twitchlila_w4.png">
  </div>

</div>

<script>
const supabase = window.supabase.createClient(
  "https://payxkjbgdrbrmwqmczhz.supabase.co",
  "sb_publishable_s8zB-yR1RpZxFEdA7aBTbQ_i8QJEhXa"
);

const msg = document.getElementById("msg");

function show(type, text){
  msg.className = "msg " + type;
  msg.style.display = "block";
  msg.innerText = text;
}

document.getElementById("login-form").addEventListener("submit", async (e)=>{
  e.preventDefault();

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  msg.style.display = "none";

  const { error } = await supabase.auth.signInWithPassword({
    email,
    password
  });

  if(error){
    show("error", "Login fehlgeschlagen: " + error.message);
    return;
  }

  const { data: userData } = await supabase.auth.getUser();

  const { data: profile } = await supabase
    .from("profiles")
    .select("role")
    .eq("id", userData.user.id)
    .maybeSingle(); // wichtig!

  if(!profile){
    show("error", "Profil nicht gefunden");
    return;
  }

  show("success", "Login erfolgreich");

  if(profile.role === "owner" || profile.role === "admin"){
    window.location.href = "admin_dashboard.html";
  } else {
    window.location.href = "creator_dashboard.html";
  }
});
</script>

</body>
</html>
