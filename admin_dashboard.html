<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HRX Admin Test</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: Arial, Helvetica, sans-serif; padding: 40px; background: #f7f6f3; color: #171923; }
    #debug { white-space: pre-wrap; padding: 16px; border: 1px solid #c7d2fe; background: #eef2ff; border-radius: 12px; }
  </style>
</head>
<body>
  <h1>ADMIN JS TEST</h1>
  <div id="debug">START</div>

  <script>
    const debug = document.getElementById("debug");

    function log(msg) {
      debug.textContent += "\n" + msg;
      console.log(msg);
    }

    window.addEventListener("error", (e) => {
      log("WINDOW ERROR: " + e.message);
    });

    window.addEventListener("unhandledrejection", (e) => {
      log("PROMISE ERROR: " + JSON.stringify(e.reason));
    });

    try {
      log("SCRIPT START");

      if (!window.supabase) {
        log("window.supabase ist undefined");
      } else {
        log("window.supabase ist da");

        const supabase = window.supabase.createClient(
          "https://payxkjbgdrbrmwqmczhz.supabase.co",
          "sb_publishable_s8zB-yR1RpZxFEdA7aBTbQ_i8QJEhXa"
        );

        log("CLIENT ERSTELLT");

        supabase.auth.getUser().then(({ data, error }) => {
          log("GET USER DATA: " + JSON.stringify(data));
          log("GET USER ERROR: " + JSON.stringify(error));
        });
      }
    } catch (err) {
      log("CATCH FEHLER: " + err.message);
    }
  </script>
</body>
</html>
