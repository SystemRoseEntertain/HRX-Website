<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HRX CreatorNET – Admin Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root{
      --bg:#f7f6f3;
      --bg-2:#efeeea;
      --text:#171923;
      --muted:#8e93a3;
      --muted-2:#b8b8b8;
      --violet:#6841b7;
      --violet-dark:#5932aa;
      --white:#ffffff;
      --line:#e7e3dc;
      --shadow:0 20px 45px rgba(16,18,24,0.10);
      --shadow-soft:0 12px 28px rgba(16,18,24,0.07);
      --max:1720px;
      --success:#1d7f4e;
      --danger:#c0352b;
      --warning:#b7791f;
      --debug-bg:#081633;
      --debug-text:#d1fae5;
      --card:#ffffffee;
      --card-soft:#fbfbfb;
      --twitch:#6441a5;
      --twitch-dark:#4f3582;
    }

    *{ box-sizing:border-box; }

    html,body{
      margin:0;
      padding:0;
      min-height:100%;
      font-family:Arial, Helvetica, sans-serif;
      color:var(--text);
      background:
        radial-gradient(560px 320px at 50% 18%, rgba(104,65,183,0.08), transparent 62%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg-2) 100%);
      overflow-x:hidden;
    }

    body{ min-height:100vh; }

    a{
      color:inherit;
      text-decoration:none;
    }

    img{
      display:block;
      max-width:100%;
      height:auto;
    }

    .page{
      min-height:100vh;
      display:flex;
      flex-direction:column;
    }

    .shell{
      width:min(calc(100% - 48px), var(--max));
      margin:0 auto;
    }

    header{
      padding:18px 0 8px;
      position:relative;
      z-index:10;
    }

    .header-row{
      display:grid;
      grid-template-columns:auto 1fr auto;
      align-items:start;
      gap:20px;
    }

    .brand{
      display:flex;
      align-items:flex-start;
    }

    .brand img{
      width:420px;
      max-width:25vw;
      min-width:260px;
    }

    .nav-wrap{
      display:flex;
      justify-content:center;
      align-items:center;
      gap:36px;
      padding-top:30px;
      flex-wrap:wrap;
    }

    .nav-link{
      position:relative;
      font-size:16px;
      font-weight:700;
      color:var(--muted-2);
      line-height:1;
      transition:0.18s ease;
    }

    .nav-link:hover{ color:var(--text); }

    .top-actions{
      display:flex;
      align-items:center;
      gap:12px;
      padding-top:14px;
    }

    .top-btn{
      border:none;
      background:var(--violet);
      color:#fff;
      font-weight:800;
      font-size:15px;
      padding:14px 22px;
      border-radius:999px;
      box-shadow:0 10px 22px rgba(104,65,183,0.18);
      transition:0.18s ease;
      cursor:pointer;
    }

    .top-btn:hover{
      background:var(--violet-dark);
      transform:translateY(-1px);
    }

    .top-btn.secondary{
      background:#fff;
      color:var(--text);
      border:1px solid rgba(23,25,35,0.08);
      box-shadow:var(--shadow-soft);
    }

    main{
      flex:1;
      padding:26px 0 70px;
    }

    .dashboard-head{
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap:20px;
      flex-wrap:wrap;
      margin-bottom:26px;
    }

    .dashboard-head h1{
      margin:0 0 8px;
      font-size:clamp(34px,4vw,56px);
      line-height:0.95;
      letter-spacing:-0.045em;
    }

    .dashboard-head p{
      margin:0;
      color:var(--muted);
      font-size:16px;
      line-height:1.5;
    }

    .message{
      display:none;
      margin-bottom:18px;
      padding:14px 16px;
      border-radius:16px;
      font-size:14px;
      line-height:1.5;
      font-weight:700;
      white-space:pre-wrap;
      word-break:break-word;
    }

    .message.show{ display:block; }

    .message.error{
      background:rgba(192,53,43,0.08);
      color:var(--danger);
      border:1px solid rgba(192,53,43,0.16);
    }

    .message.success{
      background:rgba(29,127,78,0.08);
      color:var(--success);
      border:1px solid rgba(29,127,78,0.16);
    }

    .debug-toggle-row{
      display:flex;
      justify-content:flex-end;
      margin-bottom:12px;
    }

    .debug-toggle{
      border:none;
      background:transparent;
      color:var(--muted);
      font-size:13px;
      font-weight:800;
      cursor:pointer;
      padding:6px 10px;
      border-radius:999px;
      transition:.18s ease;
    }

    .debug-toggle:hover{
      background:rgba(255,255,255,0.7);
      color:var(--text);
    }

    .debug-box{
      display:none;
      margin-bottom:18px;
      padding:14px 16px;
      border-radius:18px;
      background:var(--debug-bg);
      color:var(--debug-text);
      font-family:Consolas, Monaco, monospace;
      font-size:13px;
      line-height:1.5;
      white-space:pre-wrap;
      word-break:break-word;
      box-shadow:var(--shadow-soft);
    }

    .debug-box.show{
      display:block;
    }

    .stats{
      display:grid;
      grid-template-columns:repeat(4, minmax(0,1fr));
      gap:18px;
      margin-bottom:24px;
    }

    .stat-card{
      background:rgba(255,255,255,0.9);
      border:1px solid rgba(23,25,35,0.05);
      border-radius:26px;
      padding:24px 22px;
      box-shadow:var(--shadow-soft);
      backdrop-filter:blur(10px);
    }

    .stat-label{
      color:var(--muted);
      font-size:13px;
      font-weight:800;
      margin-bottom:10px;
      letter-spacing:.01em;
    }

    .stat-value{
      font-size:36px;
      font-weight:900;
      letter-spacing:-0.04em;
      line-height:1;
    }

    .toolbar{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:22px;
    }

    .filter-btn{
      border:none;
      background:#fff;
      color:var(--text);
      border-radius:999px;
      padding:13px 20px;
      font-size:14px;
      font-weight:800;
      cursor:pointer;
      border:1px solid rgba(23,25,35,0.08);
      box-shadow:var(--shadow-soft);
      transition:.18s ease;
    }

    .filter-btn:hover{
      transform:translateY(-1px);
    }

    .filter-btn.active{
      background:var(--violet);
      color:#fff;
      border-color:transparent;
    }

    .applications{
      display:grid;
      gap:22px;
    }

    .app-card{
      background:rgba(255,255,255,0.92);
      border:1px solid rgba(23,25,35,0.05);
      border-radius:32px;
      padding:26px;
      box-shadow:var(--shadow-soft);
      backdrop-filter:blur(12px);
    }

    .app-header{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:20px;
      margin-bottom:18px;
      flex-wrap:wrap;
    }

    .app-title{
      margin:0 0 10px;
      font-size:24px;
      font-weight:900;
      letter-spacing:-0.03em;
    }

    .app-sub{
      color:var(--muted);
      font-size:14px;
      line-height:1.65;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      border-radius:999px;
      padding:9px 14px;
      font-size:12px;
      font-weight:900;
      letter-spacing:0.05em;
      text-transform:uppercase;
      white-space:nowrap;
    }

    .badge.pending{
      background:rgba(183,121,31,0.10);
      color:var(--warning);
    }

    .badge.approved{
      background:rgba(29,127,78,0.10);
      color:var(--success);
    }

    .badge.rejected{
      background:rgba(192,53,43,0.10);
      color:var(--danger);
    }

    .app-layout{
      display:grid;
      grid-template-columns:minmax(0, 1.05fr) minmax(380px, 0.95fr);
      gap:18px;
      align-items:start;
    }

    .left-pane{
      min-width:0;
    }

    .right-pane{
      min-width:0;
    }

    .profile-links{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:16px;
    }

    .profile-link{
      display:inline-flex;
      align-items:center;
      gap:10px;
      padding:12px 16px;
      border-radius:999px;
      background:#fff;
      border:1px solid rgba(23,25,35,0.08);
      box-shadow:var(--shadow-soft);
      font-size:14px;
      font-weight:800;
      transition:.18s ease;
    }

    .profile-link:hover{
      transform:translateY(-1px);
      border-color:rgba(104,65,183,0.25);
    }

    .profile-link svg{
      width:18px;
      height:18px;
      flex:0 0 18px;
    }

    .profile-link.twitch{
      color:var(--twitch);
    }

    .mini-grid{
      display:grid;
      grid-template-columns:repeat(2, minmax(0,1fr));
      gap:12px;
      margin-bottom:16px;
    }

    .meta{
      background:var(--card-soft);
      border:1px solid rgba(23,25,35,0.05);
      border-radius:16px;
      padding:12px 14px;
    }

    .meta-label{
      font-size:11px;
      font-weight:900;
      color:var(--muted);
      text-transform:uppercase;
      letter-spacing:0.06em;
      margin-bottom:7px;
    }

    .meta-value{
      font-size:14px;
      line-height:1.45;
      word-break:break-word;
    }

    .reason-box{
      background:var(--card-soft);
      border:1px solid rgba(23,25,35,0.05);
      border-radius:18px;
      padding:16px 18px;
      margin-bottom:18px;
    }

    .reason-box .meta-label{
      margin-bottom:8px;
    }

    .embed-card{
      background:var(--card-soft);
      border:1px solid rgba(23,25,35,0.05);
      border-radius:20px;
      padding:14px;
      min-height:420px;
    }

    .embed-title{
      font-size:13px;
      font-weight:900;
      color:var(--muted);
      text-transform:uppercase;
      letter-spacing:0.06em;
      margin-bottom:12px;
    }

    .embed-stage{
      width:100%;
      min-height:360px;
      border-radius:16px;
      overflow:hidden;
      background:#111;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .embed-stage iframe{
      width:100%;
      height:420px;
      border:0;
      display:block;
    }

    .embed-fallback{
      width:100%;
      min-height:360px;
      border-radius:18px;
      background:
        radial-gradient(220px 160px at 20% 20%, rgba(100,65,165,0.35), transparent 60%),
        linear-gradient(145deg, #18181d 0%, #101014 100%);
      padding:24px;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      color:#fff;
      border:1px solid rgba(255,255,255,0.05);
    }

    .embed-fallback-top{
      display:flex;
      align-items:center;
      gap:12px;
    }

    .embed-icon{
      width:42px;
      height:42px;
      border-radius:14px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:rgba(255,255,255,0.08);
      color:#fff;
      flex:0 0 42px;
    }

    .embed-icon svg{
      width:22px;
      height:22px;
      fill:currentColor;
    }

    .embed-fallback h4{
      margin:0 0 6px;
      font-size:22px;
      letter-spacing:-0.03em;
    }

    .embed-fallback p{
      margin:0;
      color:rgba(255,255,255,0.75);
      line-height:1.6;
      max-width:520px;
    }

    .embed-fallback-cta{
      display:inline-flex;
      align-items:center;
      gap:10px;
      align-self:flex-start;
      margin-top:22px;
      padding:13px 18px;
      border-radius:999px;
      background:#fff;
      color:var(--twitch-dark);
      font-weight:900;
      box-shadow:var(--shadow-soft);
    }

    .app-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:18px;
    }

    .action-btn{
      border:none;
      border-radius:999px;
      padding:12px 18px;
      font-size:14px;
      font-weight:900;
      cursor:pointer;
      transition:.18s ease;
    }

    .action-btn:hover{
      transform:translateY(-1px);
    }

    .action-btn.approve{
      background:var(--success);
      color:#fff;
    }

    .action-btn.reject{
      background:var(--danger);
      color:#fff;
    }

    .action-btn.neutral{
      background:#fff;
      color:var(--text);
      border:1px solid rgba(23,25,35,0.08);
      box-shadow:var(--shadow-soft);
    }

    .action-btn:disabled{
      opacity:0.6;
      cursor:not-allowed;
      transform:none;
    }

    .empty-state{
      background:rgba(255,255,255,0.9);
      border:1px solid rgba(23,25,35,0.05);
      border-radius:28px;
      padding:38px 24px;
      text-align:center;
      color:var(--muted);
      box-shadow:var(--shadow-soft);
    }

    @media (max-width:1300px){
      .app-layout{
        grid-template-columns:1fr;
      }

      .right-pane{
        order:-1;
      }
    }

    @media (max-width:1180px){
      .header-row{
        grid-template-columns:1fr;
        gap:16px;
      }

      .brand{ justify-content:center; }
      .nav-wrap{ padding-top:0; }
      .top-actions{
        justify-content:center;
        padding-top:0;
      }

      .stats{ grid-template-columns:repeat(2, minmax(0,1fr)); }
    }

    @media (max-width:760px){
      .shell{
        width:min(calc(100% - 24px), var(--max));
      }

      .brand img{
        width:min(280px, 72vw);
        min-width:auto;
      }

      .nav-wrap{ gap:14px 18px; }
      .nav-link{ font-size:15px; }
      .stats{ grid-template-columns:1fr; }
      .mini-grid{ grid-template-columns:1fr; }
      .app-card{
        padding:20px;
        border-radius:24px;
      }
    }
  </style>
</head>

  <main>

</div>

<script>
  window.HRX_STATE = {
    SUPABASE_URL: "https://payxkjbgdrbrmwqmczhz.supabase.co",
    SUPABASE_ANON_KEY: "sb_publishable_s8zB-yR1RpZxFEdA7aBTbQ_i8QJEhXa",
    TWITCH_PARENT: "hrx-creator.net",
    supabase: null,
    allApplications: [],
    activeFilter: "all",
    debugVisible: false
  };
</script>

<script>
  const debugBox = document.getElementById("debugBox");
  const applicationsEl = document.getElementById("applications");
  const messageEl = document.getElementById("message");
  const filterButtons = Array.from(document.querySelectorAll(".filter-btn"));
  const debugToggleBtn = document.getElementById("debugToggleBtn");

  function log(text){
    debugBox.textContent += "\n" + text;
    console.log(text);
  }

  function showMessage(type, text){
    messageEl.className = "message show " + type;
    messageEl.textContent = text;
  }

  function clearMessage(){
    messageEl.className = "message";
    messageEl.textContent = "";
  }

  function escapeHtml(value){
    if(value === null || value === undefined) return "";
    return String(value)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }

  function formatDate(value){
    if(!value) return "-";
    var d = new Date(value);
    if(Number.isNaN(d.getTime())) return String(value);
    return d.toLocaleString("de-DE");
  }

  function normalizeStatus(status){
    if(status === "approved" || status === "rejected" || status === "pending") return status;
    return "pending";
  }

  function badge(status){
    var s = normalizeStatus(status);
    return '<span class="badge ' + s + '">' + s + '</span>';
  }

  function twitchIcon(){
    return `
      <svg viewBox="0 0 24 24" aria-hidden="true" fill="currentColor">
        <path d="M4.286 2 2 7.714v10.857h4.571V22l3.429-3.429h3.429L20.857 11.143V2H4.286Zm14.286 8-3.429 3.429h-3.429L8.286 16.857v-3.428H4.857V4.286h13.715V10ZM15.143 6.57h-1.714v5.144h1.714V6.57Zm-4.572 0H8.857v5.144h1.714V6.57Z"/>
      </svg>
    `;
  }

  function toggleDebug(forceValue){
    if(typeof forceValue === "boolean"){
      window.HRX_STATE.debugVisible = forceValue;
    } else {
      window.HRX_STATE.debugVisible = !window.HRX_STATE.debugVisible;
    }

    debugBox.classList.toggle("show", window.HRX_STATE.debugVisible);
    debugToggleBtn.textContent = window.HRX_STATE.debugVisible ? "Debug ausblenden" : "Debug anzeigen";
  }

  function extractTwitchData(url, fallbackName){
    if(!url && !fallbackName){
      return null;
    }

    var safeUrl = (url || "").trim();
    var lower = safeUrl.toLowerCase();

    if(lower.includes("twitch.tv/videos/")){
      var parts = safeUrl.split("/videos/");
      if(parts[1]){
        var videoId = parts[1].split(/[?#&/]/)[0];
        if(videoId){
          return {
            type: "video",
            id: videoId,
            profileUrl: safeUrl
          };
        }
      }
    }

    if(lower.includes("twitch.tv/")){
      var after = safeUrl.split("twitch.tv/")[1];
      if(after){
        var firstPart = after.split(/[?#]/)[0].split("/")[0];
        if(firstPart && firstPart !== "videos"){
          return {
            type: "channel",
            id: firstPart,
            profileUrl: "https://www.twitch.tv/" + firstPart
          };
        }
      }
    }

    if(fallbackName){
      return {
        type: "channel",
        id: fallbackName,
        profileUrl: "https://www.twitch.tv/" + fallbackName
      };
    }

    return null;
  }

  window.HRX_HELPERS = {
    log,
    showMessage,
    clearMessage,
    escapeHtml,
    formatDate,
    normalizeStatus,
    badge,
    applicationsEl,
    filterButtons,
    toggleDebug,
    twitchIcon,
    extractTwitchData
  };

  toggleDebug(false);

  debugToggleBtn.addEventListener("click", function(){
    toggleDebug();
  });

  window.addEventListener("error", function(event){
    log("WINDOW ERROR: " + event.message);
    toggleDebug(true);
  });

  window.addEventListener("unhandledrejection", function(event){
    var msg = event.reason && event.reason.message ? event.reason.message : (event.reason || "unknown");
    log("PROMISE ERROR: " + msg);
    toggleDebug(true);
  });
</script>

<script>
  (function(){
    var S = window.HRX_STATE;
    var H = window.HRX_HELPERS;

    function filteredApplications(){
      if(S.activeFilter === "all") return S.allApplications;
      return S.allApplications.filter(function(app){
        return H.normalizeStatus(app.status) === S.activeFilter;
      });
    }

    function updateStats(){
      document.getElementById("statTotal").textContent = S.allApplications.length;
      document.getElementById("statPending").textContent = S.allApplications.filter(function(app){
        return H.normalizeStatus(app.status) === "pending";
      }).length;
      document.getElementById("statApproved").textContent = S.allApplications.filter(function(app){
        return H.normalizeStatus(app.status) === "approved";
      }).length;
      document.getElementById("statRejected").textContent = S.allApplications.filter(function(app){
        return H.normalizeStatus(app.status) === "rejected";
      }).length;
    }

    function renderProfileLinks(app){
      var twitch = H.extractTwitchData(app.twitch_link, app.twitch);
      if(!twitch) return "";

      var html = '<div class="profile-links">';
      html += '<a class="profile-link twitch" href="' + H.escapeHtml(twitch.profileUrl) + '" target="_blank" rel="noopener noreferrer">';
      html += H.twitchIcon();
      html += '<span>Twitch Profil öffnen</span>';
      html += '</a>';
      html += '</div>';
      return html;
    }

    function renderTwitchPreview(app){
      var twitch = H.extractTwitchData(app.twitch_link, app.twitch);

      if(!twitch){
        return '' +
          '<div class="embed-card">' +
            '<div class="embed-title">Twitch Preview</div>' +
            '<div class="embed-fallback">' +
              '<div>' +
                '<div class="embed-fallback-top">' +
                  '<div class="embed-icon">' + H.twitchIcon() + '</div>' +
                  '<div>' +
                    '<h4>Kein Twitch-Link vorhanden</h4>' +
                    '<p>Für diese Bewerbung gibt es aktuell keinen verwendbaren Twitch-Link.</p>' +
                  '</div>' +
                '</div>' +
              '</div>' +
            '</div>' +
          '</div>';
      }

      if(twitch.type === "video"){
        var src = 'https://player.twitch.tv/?video=' + encodeURIComponent(twitch.id) + '&parent=' + encodeURIComponent(S.TWITCH_PARENT);

        return '' +
          '<div class="embed-card">' +
            '<div class="embed-title">Twitch Preview</div>' +
            '<div class="embed-stage">' +
              '<iframe src="' + src + '" allowfullscreen="true" scrolling="no"></iframe>' +
            '</div>' +
          '</div>';
      }

      return '' +
        '<div class="embed-card">' +
          '<div class="embed-title">Twitch Preview</div>' +
          '<div class="embed-fallback">' +
            '<div>' +
              '<div class="embed-fallback-top">' +
                '<div class="embed-icon">' + H.twitchIcon() + '</div>' +
                '<div>' +
                  '<h4>' + H.escapeHtml(app.twitch || "Twitch Kanal") + '</h4>' +
                  '<p>Für Kanal-Links zeigen wir hier bewusst keinen hässlichen Offline-Twitch-Screen. Stattdessen kannst du den Kanal direkt sauber öffnen.</p>' +
                '</div>' +
              '</div>' +
            '</div>' +
            '<a class="embed-fallback-cta" href="' + H.escapeHtml(twitch.profileUrl) + '" target="_blank" rel="noopener noreferrer">' +
              H.twitchIcon() +
              '<span>Kanal auf Twitch öffnen</span>' +
            '</a>' +
          '</div>' +
        '</div>';
    }

    function renderApplications(){
      var items = filteredApplications();

      if(!items.length){
        H.applicationsEl.innerHTML = '<div class="empty-state"><h3>Keine Bewerbungen in diesem Filter</h3><p>Aktuell gibt es hier nichts anzuzeigen.</p></div>';
        return;
      }

      var html = "";

      items.forEach(function(app){
        html += '<article class="app-card">';
        html += '<div class="app-header">';
        html += '<div>';
        html += '<h2 class="app-title">' + H.escapeHtml(app.twitch || app.tiktok || app.email || "Bewerbung") + '</h2>';
        html += '<div class="app-sub">Eingegangen: ' + H.escapeHtml(H.formatDate(app.created_at)) + '<br>Plattform: ' + H.escapeHtml(app.platform || "-") + '<br>Empfohlen von: ' + H.escapeHtml(app.referred_by || "-") + '</div>';
        html += '</div>';
        html += '<div>' + H.badge(app.status) + '</div>';
        html += '</div>';

        html += '<div class="app-layout">';

        html += '<div class="left-pane">';
        html += renderProfileLinks(app);

        html += '<div class="mini-grid">';
        html += '<div class="meta"><div class="meta-label">E-Mail</div><div class="meta-value">' + H.escapeHtml(app.email || "-") + '</div></div>';
        html += '<div class="meta"><div class="meta-label">Discord</div><div class="meta-value">' + H.escapeHtml(app.discord || "-") + '</div></div>';
        html += '<div class="meta"><div class="meta-label">Twitch</div><div class="meta-value">' + H.escapeHtml(app.twitch || "-") + '</div></div>';
        html += '<div class="meta"><div class="meta-label">TikTok</div><div class="meta-value">' + H.escapeHtml(app.tiktok || "-") + '</div></div>';
        html += '<div class="meta"><div class="meta-label">Streams/Woche</div><div class="meta-value">' + H.escapeHtml(app.streams != null ? app.streams : "-") + '</div></div>';
        html += '<div class="meta"><div class="meta-label">Viewer</div><div class="meta-value">' + H.escapeHtml(app.viewer != null ? app.viewer : "-") + '</div></div>';
        html += '<div class="meta"><div class="meta-label">Kategorie</div><div class="meta-value">' + H.escapeHtml(app.category || "-") + '</div></div>';
        html += '<div class="meta"><div class="meta-label">Age Group</div><div class="meta-value">' + H.escapeHtml(app.age_group || "-") + '</div></div>';
        html += '</div>';

        html += '<div class="reason-box"><div class="meta-label">Warum HRX CreatorNET?</div><div class="meta-value">' + H.escapeHtml(app.reason || "-") + '</div></div>';

        html += '<div class="app-actions">';
        html += '<button class="action-btn approve" data-id="' + H.escapeHtml(app.id) + '" data-action="approve">Approve</button>';
        html += '<button class="action-btn reject" data-id="' + H.escapeHtml(app.id) + '" data-action="reject">Reject</button>';
        html += '<button class="action-btn neutral" data-id="' + H.escapeHtml(app.id) + '" data-action="pending">Auf Pending setzen</button>';
        html += '</div>';
        html += '</div>';

        html += '<div class="right-pane">';
        html += renderTwitchPreview(app);
        html += '</div>';

        html += '</div>';
        html += '</article>';
      });

      H.applicationsEl.innerHTML = html;

      H.applicationsEl.querySelectorAll("button[data-action]").forEach(function(btn){
        btn.addEventListener("click", async function(){
          var id = this.dataset.id;
          var action = this.dataset.action;

          if(action === "approve"){
            await approveApplication(id, this);
          } else {
            await updateStatus(id, action, this);
          }
        });
      });
    }

    async function updateStatus(id, status, button){
      H.clearMessage();
      if(button) button.disabled = true;

      try{
        var result = await S.supabase
          .from("applications")
          .update({ status: status, updated_at: new Date().toISOString() })
          .eq("id", id);

        if(result.error){
          H.log("STATUS ERROR: " + result.error.message);
          H.showMessage("error", "Status-Update fehlgeschlagen: " + result.error.message);
          H.toggleDebug(true);
          return;
        }

        H.showMessage("success", 'Status erfolgreich auf "' + status + '" gesetzt.');
        await loadDashboard();
      } catch(err){
        H.log("STATUS CATCH ERROR: " + (err.message || err));
        H.showMessage("error", "Status-Update fehlgeschlagen.");
        H.toggleDebug(true);
      } finally {
        if(button) button.disabled = false;
      }
    }

    async function approveApplication(id, button){
      H.clearMessage();
      if(button) button.disabled = true;

      try{
        var sessionRes = await S.supabase.auth.getSession();
        var accessToken = sessionRes.data && sessionRes.data.session ? sessionRes.data.session.access_token : null;

        if(!accessToken){
          H.log("APPROVE ERROR: Keine Session");
          H.showMessage("error", "Keine Session gefunden.");
          H.toggleDebug(true);
          return;
        }

        var response = await fetch(S.SUPABASE_URL + "/functions/v1/approve-application", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + accessToken
          },
          body: JSON.stringify({ applicationId: id })
        });

        var result = await response.json().catch(function(){ return {}; });

        if(!response.ok){
          H.log("APPROVE ERROR: " + JSON.stringify(result));
          H.showMessage("error", "Approve fehlgeschlagen: " + (result.error || response.statusText));
          H.toggleDebug(true);
          return;
        }

        H.log("APPROVE OK: " + JSON.stringify(result));
        H.showMessage("success", "Bewerbung angenommen und Creator-User angelegt.");
        await loadDashboard();
      } catch(err){
        H.log("APPROVE CATCH ERROR: " + (err.message || err));
        H.showMessage("error", "Approve fehlgeschlagen.");
        H.toggleDebug(true);
      } finally {
        if(button) button.disabled = false;
      }
    }

    async function loadDashboard(){
      H.clearMessage();

      try{
        H.log("Dashboard lädt");

        if(!window.supabase){
          H.log("window.supabase fehlt");
          H.showMessage("error", "Supabase CDN wurde nicht geladen.");
          H.toggleDebug(true);
          return;
        }

        if(!S.supabase){
          S.supabase = window.supabase.createClient(S.SUPABASE_URL, S.SUPABASE_ANON_KEY);
          H.log("Supabase Client erstellt");
        }

        var authRes = await S.supabase.auth.getUser();

        if(authRes.error){
          H.log("AUTH ERROR: " + authRes.error.message);
          H.showMessage("error", "Auth-Fehler: " + authRes.error.message);
          H.toggleDebug(true);
          return;
        }

        var user = authRes.data ? authRes.data.user : null;

        if(!user){
          H.log("Kein User eingeloggt");
          window.location.href = "login.html";
          return;
        }

        H.log("User ID: " + user.id);

        var profileRes = await S.supabase
          .from("profiles")
          .select("id, email, role")
          .eq("id", user.id)
          .maybeSingle();

        if(profileRes.error){
          H.log("PROFILE ERROR: " + profileRes.error.message);
          H.showMessage("error", "Profil-Fehler: " + profileRes.error.message);
          H.toggleDebug(true);
          return;
        }

        var profile = profileRes.data;

        if(!profile || (profile.role !== "owner" && profile.role !== "admin")){
          H.log("Zugriff verweigert");
          H.showMessage("error", "Kein Zugriff auf das Admin Dashboard.");
          H.toggleDebug(true);
          return;
        }

        var appRes = await S.supabase
          .from("applications")
          .select("*");

        if(appRes.error){
          H.log("APPLICATION ERROR: " + appRes.error.message);
          H.showMessage("error", "Applications-Fehler: " + appRes.error.message);
          H.toggleDebug(true);
          return;
        }

        S.allApplications = Array.isArray(appRes.data) ? appRes.data : [];
        S.allApplications.sort(function(a, b){
          var aTime = a.created_at ? new Date(a.created_at).getTime() : 0;
          var bTime = b.created_at ? new Date(b.created_at).getTime() : 0;
          return bTime - aTime;
        });

        updateStats();
        renderApplications();
      } catch(err){
        H.log("CATCH ERROR: " + (err.message || err));
        H.showMessage("error", "Unerwarteter Fehler: " + (err.message || err));
        H.toggleDebug(true);
      }
    }

    document.getElementById("reloadBtn").addEventListener("click", function(){
      loadDashboard();
    });

    document.getElementById("logoutBtn").addEventListener("click", async function(){
      if(S.supabase){
        await S.supabase.auth.signOut();
      }
      window.location.href = "login.html";
    });

    H.filterButtons.forEach(function(btn){
      btn.addEventListener("click", function(){
        H.filterButtons.forEach(function(x){ x.classList.remove("active"); });
        btn.classList.add("active");
        S.activeFilter = btn.dataset.filter;
        renderApplications();
      });
    });

    loadDashboard();
  })();
</script>
</body>
</html>
