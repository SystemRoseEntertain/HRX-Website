<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HRX Admin Test</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body{
      font-family:Arial, Helvetica, sans-serif;
      background:#f7f6f3;
      color:#171923;
      margin:0;
      padding:24px;
    }
    h1{
      margin:0 0 20px;
    }
    #debug{
      background:#0f172a;
      color:#d1fae5;
      padding:16px;
      border-radius:12px;
      white-space:pre-wrap;
      margin-bottom:20px;
      font-family:Consolas, monospace;
      font-size:13px;
      line-height:1.5;
    }
    #output{
      display:grid;
      gap:16px;
    }
    .card{
      background:#fff;
      border:1px solid #e7e3dc;
      border-radius:16px;
      padding:16px;
    }
  </style>
</head>
<body>
  <h1>HRX Admin Test</h1>
  <div id="debug">Start…</div>
  <div id="output"></div>

  <script>
    const SUPABASE_URL = "https://payxkjbgdrbrmwqmczhz.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_s8zB-yR1RpZxFEdA7aBTbQ_i8QJEhXa";

    const debug = document.getElementById("debug");
    const output = document.getElementById("output");

    function log(text){
      debug.textContent += "\n" + text;
      console.log(text);
    }

    window.addEventListener("error", (event) => {
      log("WINDOW ERROR: " + event.message);
    });

    window.addEventListener("unhandledrejection", (event) => {
      log("PROMISE ERROR: " + (event.reason?.message || event.reason || "unknown"));
    });

    async function run(){
      try{
        log("1) Script läuft");

        if(!window.supabase){
          log("2) window.supabase fehlt");
          return;
        }

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        log("2) Supabase Client erstellt");

        const { data: userData, error: userError } = await supabase.auth.getUser();

        if(userError){
          log("AUTH ERROR: " + userError.message);
          return;
        }

        if(!userData.user){
          log("Kein User eingeloggt");
          return;
        }

        log("3) User ID: " + userData.user.id);
        log("4) User Mail: " + (userData.user.email || "-"));

        const { data: profile, error: profileError } = await supabase
          .from("profiles")
          .select("id, email, role")
          .eq("id", userData.user.id)
          .maybeSingle();

        if(profileError){
          log("PROFILE ERROR: " + profileError.message);
          return;
        }

        log("5) Profil: " + JSON.stringify(profile));

        const { data: applications, error: appError } = await supabase
          .from("applications")
          .select("*");

        if(appError){
          log("APPLICATION ERROR: " + appError.message);
          return;
        }

        log("6) Applications geladen: " + applications.length);

        output.innerHTML = applications.map(app => `
          <div class="card">
            <strong>${app.twitch || app.tiktok || app.email || "Bewerbung"}</strong><br>
            Plattform: ${app.platform || "-"}<br>
            E-Mail: ${app.email || "-"}<br>
            Discord: ${app.discord || "-"}<br>
            Viewer: ${app.viewer ?? "-"}<br>
            Streams: ${app.streams ?? "-"}<br>
            Status: ${app.status || "-"}<br>
            Reason: ${app.reason || "-"}
          </div>
        `).join("");

      }catch(err){
        log("CATCH ERROR: " + (err.message || err));
      }
    }

    run();
  </script>
</body>
</html>
