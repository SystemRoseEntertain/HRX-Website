<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HRX CreatorNET Bewerbung</title>

<style>
body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background: radial-gradient(circle at top, #1a1033, #05070f);
    color:white;
    min-height:100vh;
    display:flex;
    flex-direction:column;
}

/* HEADER */
.header{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:80px;
    background:linear-gradient(90deg,#140b2a,#0b0f1e);
    border-bottom:1px solid rgba(167,123,255,0.2);
    box-shadow:0 0 20px rgba(122,77,255,0.4);
    display:flex;
    align-items:center;
    padding-left:30px;
    z-index:1000;
}
.header img{ height:50px; }

/* MAIN */
main{
    flex:1;
    display:flex;
    justify-content:center;
    padding:120px 20px 40px 20px;
}

.form-box{
    max-width:700px;
    width:100%;
    background:rgba(255,255,255,0.05);
    padding:30px;
    border-radius:16px;
    box-shadow:0 10px 40px rgba(0,0,0,0.5);
}

h1{
    text-align:center;
    margin-bottom:20px;
}

label{
    display:block;
    margin-top:20px;
    font-weight:bold;
}

input, textarea, select{
    width:100%;
    padding:12px;
    margin-top:8px;
    border-radius:8px;
    border:none;
    background:rgba(0,0,0,0.6);
    color:white;
    font-size:15px;
}

select option{
    background:#111;
    color:white;
}

textarea{ min-height:120px; }

.submit-btn{
    margin-top:30px;
    width:100%;
    padding:16px;
    background:linear-gradient(90deg,#7a4dff,#a77bff);
    border:none;
    border-radius:12px;
    color:white;
    font-size:18px;
    cursor:pointer;
}

.submit-btn:hover{ transform:scale(1.02); }

.back{
    display:block;
    text-align:center;
    margin-top:20px;
    opacity:0.7;
    color:white;
    text-decoration:none;
}
.back:hover{ text-decoration:underline; }

/* FOOTER */
footer{
    text-align:center;
    padding:20px;
    font-size:12px;
}

.link-btn{
    padding:4px 12px;
    border-radius:10px;
    text-decoration:none;
    color:#d8cfff;
    background:rgba(122,77,255,0.15);
    box-shadow:0 0 10px rgba(122,77,255,0.6);
    transition:0.2s;
    margin:0 5px;
    display:inline-block;
}

.link-btn:hover{
    background:rgba(122,77,255,0.35);
    box-shadow:0 0 18px rgba(167,123,255,0.9);
    transform:scale(1.05);
}

.small-link{
    color:#a77bff;
    text-decoration:none;
}
.small-link:hover{ text-decoration:underline; }

.note{
    margin-top:16px;
    padding:12px 14px;
    border-radius:12px;
    background:rgba(0,0,0,0.25);
    border:1px solid rgba(167,123,255,0.18);
    font-size:12px;
    opacity:0.85;
    line-height:1.4;
}

.error{
    margin-top:14px;
    padding:10px 12px;
    border-radius:12px;
    background:rgba(255,0,0,0.12);
    border:1px solid rgba(255,0,0,0.25);
    display:none;
}

.success{
    margin-top:14px;
    padding:10px 12px;
    border-radius:12px;
    background:rgba(0,255,120,0.10);
    border:1px solid rgba(0,255,120,0.20);
    display:none;
}
</style>
</head>

<body>

<div class="header">
    <img src="HRX_Logo_Twitchlila_w4.png" alt="HRX Logo">
</div>

<main>
<div class="form-box">

<h1>HRX CreatorNET Bewerbung</h1>

<!-- WICHTIG: Das ist KEIN Netlify-Forms mehr, sondern Function-Submit -->
<form id="hrxForm" autocomplete="on">
    <!-- Anti-Spam Honeypot (unsichtbar) -->
    <input type="text" name="website" id="website" style="display:none" tabindex="-1" autocomplete="off">

    <label>Twitch Name</label>
    <input type="text" name="twitch" required>

    <label>Twitch Link</label>
    <input type="url" name="twitch_link" required>

    <label>Durchschnittliche Viewer (30 Tage)</label>
    <input type="number" name="viewer" required min="0">

    <label>Streams pro Woche</label>
    <input type="number" name="streams" required min="0">

    <label>Content Kategorie</label>
    <select name="category" required>
        <option>Gaming</option>
        <option>Just Chatting</option>
        <option>IRL</option>
        <option>Music</option>
        <option>Andere</option>
    </select>

    <label>Discord Tag / Kontakt</label>
    <input type="text" name="discord" required>

    <label>Warum willst du ins HRX CreatorNET?</label>
    <textarea name="reason" required></textarea>

    <label>
        <input type="checkbox" name="consent" required>
        Ich stimme der <a href="datenschutz.html" class="small-link" target="_blank" rel="noopener">Datenschutzerklärung</a>
        und der Kontaktaufnahme zu.
    </label>

    <button type="submit" class="submit-btn" id="sendBtn">Bewerbung senden</button>

    <div class="error" id="errorBox"></div>
    <div class="success" id="successBox">✅ Bewerbung wurde gesendet. Weiterleitung…</div>

    <div class="note">
       
    </div>
</form>

<a href="index.html" class="back">← Zurück zur Startseite</a>

</div>
</main>

<footer>
<a href="impressum.html" class="link-btn">Impressum</a>
<a href="datenschutz.html" class="link-btn">Datenschutz</a>
</footer>

<script>
const form = document.getElementById("hrxForm");
const btn = document.getElementById("sendBtn");
const errorBox = document.getElementById("errorBox");
const successBox = document.getElementById("successBox");

function showError(msg){
  errorBox.style.display = "block";
  errorBox.textContent = msg;
}
function clearError(){
  errorBox.style.display = "none";
  errorBox.textContent = "";
}

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  clearError();

  // Honeypot
  const hp = document.getElementById("website").value.trim();
  if(hp.length > 0){
    // Bot -> tu so als wärs ok
    successBox.style.display = "block";
    setTimeout(()=>window.location.href="danke.html", 700);
    return;
  }

  btn.disabled = true;
  btn.textContent = "Sende…";

  const data = Object.fromEntries(new FormData(form).entries());

  try{
    const res = await fetch("/.netlify/functions/apply", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify(data)
    });

    const out = await res.json().catch(()=>({}));

    if(!res.ok){
      throw new Error(out.error || "Senden fehlgeschlagen. Bitte später erneut versuchen.");
    }

    successBox.style.display = "block";
    setTimeout(()=>window.location.href="danke.html", 900);

  }catch(err){
    showError(err.message || "Unbekannter Fehler.");
  }finally{
    btn.disabled = false;
    btn.textContent = "Bewerbung senden";
  }
});
</script>

</body>
</html>
