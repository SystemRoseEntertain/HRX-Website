<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HRX CreatorNET Bewerbung</title>

<style>
/* ✅ Fix für "versetzte Breiten" & Header overflow */
*{ box-sizing:border-box; }

body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background: radial-gradient(circle at top, #1a1033, #05070f);
    color:white;
    min-height:100vh;
    display:flex;
    flex-direction:column;
}

.header{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:80px;
    background:linear-gradient(90deg,#140b2a,#0b0f1e);
    border-bottom:1px solid rgba(167,123,255,0.2);
    box-shadow:0 0 20px rgba(122,77,255,0.4);
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 24px;
    z-index:1000;
}
.header a{ display:flex; align-items:center; }
.header img{ height:50px; }

/* Sprachbuttons oben rechts */
.lang-switch{
    display:flex;
    gap:10px;
    flex-shrink:0;          /* ✅ verhindert rausdrücken */
}
.lang-btn{
    padding:6px 14px;
    border-radius:10px;
    background: rgba(122,77,255,0.2);
    color:white;
    text-decoration:none;
    font-size:13px;
    transition:0.2s;
    box-shadow: 0 0 10px rgba(122,77,255,0.5);
    cursor:pointer;
    user-select:none;
    white-space:nowrap;
}
.lang-btn:hover{
    background: rgba(167,123,255,0.5);
    transform: scale(1.05);
}

main{
    flex:1;
    display:flex;
    justify-content:center;
    padding:120px 20px 40px 20px;
}

.form-box{
    max-width:700px;
    width:100%;
    background:rgba(255,255,255,0.05);
    padding:30px;
    border-radius:16px;
    box-shadow:0 10px 40px rgba(0,0,0,0.5);
}

h1{
    text-align:center;
    margin-bottom:10px;
}

.free-note{
    text-align:center;
    margin-bottom:25px;
    opacity:0.85;
    font-size:15px;
}

label{display:block;margin-top:20px;font-weight:bold;}

input, textarea, select{
    width:100%;
    padding:12px;
    margin-top:8px;
    border-radius:8px;
    border:none;
    background:rgba(0,0,0,0.6);
    color:white;
    font-size:15px;
}

textarea{min-height:120px;}

.submit-btn{
    margin-top:30px;
    width:100%;
    padding:16px;
    background:linear-gradient(90deg,#7a4dff,#a77bff);
    border:none;
    border-radius:12px;
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:0.2s;
}
.submit-btn:hover{ transform:scale(1.02); }

/* ✅ Fix: bündig wie Submit-Button */
.secondary-btn{
    display:block;
    margin:12px 0 0 0;
    width:100%;
    padding:14px;
    background: rgba(122,77,255,0.18);
    border:1px solid rgba(167,123,255,0.35);
    border-radius:12px;
    color:#efeaff;
    font-size:16px;
    cursor:pointer;
    text-align:center;
    text-decoration:none;
    transition:0.2s;
    box-shadow: 0 0 14px rgba(122,77,255,0.35);
}
.secondary-btn:hover{
    background: rgba(122,77,255,0.28);
    transform:scale(1.02);
    box-shadow: 0 0 18px rgba(167,123,255,0.55);
}

footer{text-align:center;padding:20px;font-size:12px;}
.link-btn{
    padding:4px 12px;
    border-radius:10px;
    text-decoration:none;
    color:#d8cfff;
    background:rgba(122,77,255,0.15);
    margin:0 5px;
}

/* Mobile etwas kompakter */
@media (max-width:520px){
    .header{ padding:0 14px; }
    .lang-btn{ padding:5px 10px; font-size:12px; }
    .form-box{ padding:22px; }
}
</style>
</head>

<body>

<div class="header">
    <!-- Logo links oben -> Link zur Startseite -->
    <a href="index.html">
        <img src="HRX_Logo_Twitchlila_w4.png" alt="HRX Logo">
    </a>

    <!-- DE/EN rechts oben -> switcht nur Text -->
    <div class="lang-switch">
        <span class="lang-btn" onclick="setLang('de')">DE</span>
        <span class="lang-btn" onclick="setLang('en')">EN</span>
    </div>
</div>

<main>
<div class="form-box">

<h1 id="h_title">HRX CreatorNET Bewerbung</h1>

<p class="free-note" id="h_note">
100 % kostenlos für Creator – HRX CreatorNET bündelt Reichweite,
holt starke Partnerdeals und verteilt Einnahmen fair im Netzwerk.
</p>

<form action="https://api.web3forms.com/submit" method="POST">

<input type="hidden" name="access_key" value="3c953fd6-290b-45a8-b14d-cc9ba7910960">
<input type="hidden" name="subject" value="Neue HRX CreatorNET Bewerbung">
<input type="hidden" name="redirect" value="https://hrx-creator.net/danke.html">
<input type="checkbox" name="botcheck" style="display:none">

<label id="l_twitch">Twitch Name</label>
<input type="text" name="twitch" required>

<label id="l_twitch_link">Twitch Link</label>
<input type="url" name="twitch_link" required>

<label id="l_viewer">Durchschnittliche Viewer</label>
<input type="number" name="viewer" required>

<label id="l_streams">Streams pro Woche</label>
<input type="number" name="streams" required>

<label id="l_category">Kategorie</label>
<select name="category" id="category">
    <option value="Gaming">Gaming</option>
    <option value="Just Chatting">Just Chatting</option>
    <option value="IRL">IRL</option>
    <option value="Music">Music</option>
    <option value="Andere">Andere</option>
</select>

<label id="l_discord">Discord</label>
<input type="text" name="discord" required>

<label id="l_reason">Warum willst du ins HRX CreatorNET?</label>
<textarea name="reason" required></textarea>

<label id="l_privacy">
    <input type="checkbox" required>
    <span id="privacy_text">
        Ich stimme der <a href="datenschutz.html" target="_blank">Datenschutzerklärung</a> zu.
    </span>
</label>

<button type="submit" class="submit-btn" id="btn_submit">Bewerbung senden</button>

<!-- Mehr erfahren Button -->
<a href="mehr_erfahren.html" class="secondary-btn" id="btn_more">Mehr erfahren</a>

</form>

</div>
</main>

<footer>
<a href="impressum.html" class="link-btn" id="f_imprint">Impressum</a>
<a href="datenschutz.html" class="link-btn" id="f_privacy">Datenschutz</a>
</footer>

<script>
const i18n = {
    de: {
        title: "HRX CreatorNET Bewerbung",
        note: "100 % kostenlos für Creator – HRX CreatorNET bündelt Reichweite, holt starke Partnerdeals und verteilt Einnahmen fair im Netzwerk.",
        labels: {
            twitch: "Twitch Name",
            twitch_link: "Twitch Link",
            viewer: "Durchschnittliche Viewer",
            streams: "Streams pro Woche",
            category: "Kategorie",
            discord: "Discord",
            reason: "Warum willst du ins HRX CreatorNET?"
        },
        category: ["Gaming", "Just Chatting", "IRL", "Music", "Andere"],
        privacyText: 'Ich stimme der <a href="datenschutz.html" target="_blank">Datenschutzerklärung</a> zu.',
        submit: "Bewerbung senden",
        more: "Mehr erfahren",
        imprint: "Impressum",
        privacyFooter: "Datenschutz"
    },
    en: {
        title: "HRX CreatorNET Application",
        note: "100% free for creators — HRX CreatorNET combines reach, secures strong brand deals, and distributes revenue fairly within the network.",
        labels: {
            twitch: "Twitch name",
            twitch_link: "Twitch link",
            viewer: "Average viewers",
            streams: "Streams per week",
            category: "Category",
            discord: "Discord",
            reason: "Why do you want to join HRX CreatorNET?"
        },
        category: ["Gaming", "Just Chatting", "IRL", "Music", "Other"],
        privacyText: 'I agree to the <a href="datenschutz.html" target="_blank">privacy policy</a>.',
        submit: "Submit application",
        more: "Learn more",
        imprint: "Legal notice",
        privacyFooter: "Privacy"
    }
};

function setLang(lang){
    const t = i18n[lang];

    document.documentElement.lang = lang;
    document.title = t.title;

    document.getElementById("h_title").innerText = t.title;
    document.getElementById("h_note").innerText = t.note;

    document.getElementById("l_twitch").innerText = t.labels.twitch;
    document.getElementById("l_twitch_link").innerText = t.labels.twitch_link;
    document.getElementById("l_viewer").innerText = t.labels.viewer;
    document.getElementById("l_streams").innerText = t.labels.streams;
    document.getElementById("l_category").innerText = t.labels.category;
    document.getElementById("l_discord").innerText = t.labels.discord;
    document.getElementById("l_reason").innerText = t.labels.reason;

    const sel = document.getElementById("category");
    const current = sel.selectedIndex;
    sel.innerHTML = "";
    t.category.forEach((name) => {
        const opt = document.createElement("option");
        opt.textContent = name;
        opt.value = name;
        sel.appendChild(opt);
    });
    sel.selectedIndex = Math.min(current, sel.options.length - 1);

    document.getElementById("privacy_text").innerHTML = t.privacyText;

    document.getElementById("btn_submit").innerText = t.submit;
    document.getElementById("btn_more").innerText = t.more;

    document.getElementById("f_imprint").innerText = t.imprint;
    document.getElementById("f_privacy").innerText = t.privacyFooter;
}
</script>

</body>
</html>
